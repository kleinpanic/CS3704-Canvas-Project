<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas Deadline Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-copy">
        <p class="eyebrow">Canvas companion</p>
        <h1>Deadlines</h1>
        <p class="header-subtitle">Stay on top of what needs attention next.</p>
      </div>
      <div class="header-meta">
        <span id="user-info" class="meta-pill">0 courses</span>
        <span id="cache-badge" class="cache-badge hidden">Cached</span>
      </div>
    </header>

    <section id="filter-section" class="toolbar hidden">
      <label class="field-label" for="course-filter">Course</label>
      <select id="course-filter">
        <option value="">All Courses</option>
      </select>
    </section>

    <main>
      <section id="upcoming-section" class="panel">
        <div class="section-heading">
          <div>
            <p class="section-kicker">Assignments</p>
            <h2>Upcoming work</h2>
          </div>
          <span id="assignment-count" class="count-pill hidden">0 items</span>
        </div>

        <ul id="upcoming-list" class="assignment-list"></ul>
        <div id="loading" class="status-card spinner">Loading your assignments...</div>
        <div id="error" class="status-card error hidden"></div>
      </section>
    </main>

    <footer class="app-footer">
      <button id="refresh-btn" class="btn btn-secondary">Refresh</button>
      <button id="settings-btn" class="btn btn-primary">Settings</button>
    </footer>
  </div>
  <script src="app.js" type="module"></script>
</body>
</html>

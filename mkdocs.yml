site_name: CS3704 Canvas Project Docs
site_description: Team-maintained docs portal for the CS3704 Canvas project
site_url: https://kleinpanic.github.io/CS3704-Canvas-Project/
repo_url: https://github.com/kleinpanic/CS3704-Canvas-Project
repo_name: kleinpanic/CS3704-Canvas-Project
docs_dir: docs-site
site_dir: site
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
markdown_extensions:
  - admonition
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Workflow & Governance: workflow.md
  - Roadmap: roadmap.md
  - PM3 Review: pm3-review.md

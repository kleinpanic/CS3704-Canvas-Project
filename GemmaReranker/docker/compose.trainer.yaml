# =============================================================================
# Docker Compose — DPO Training Container
# Runs run_pipeline.py Path B using TRL + HuggingFace PEFT.
# Connects to teacher and student slots via Docker network.
# =============================================================================
# Usage:
#   docker compose -f docker/compose.trainer.yaml run --rm gemma-reranker-trainer \
#     python scripts/run_pipeline.py --path b --teacher-url http://teacher:8000/v1
#
# Teardown after training:
#   docker compose -f docker/compose.teacher.yaml down
#   docker compose -f docker/compose.student.yaml down

services:
  gemma-reranker-trainer:
    image: nvcr.io/nvidia/pytorch:25.11-py3
    container_name: gemma-reranker-trainer
    mem_limit: 64g
    restart: "no"
    shm_size: 8g
    ipc: host
    environment:
      HF_TOKEN: ${HF_TOKEN}
      CUDA_VISIBLE_DEVICES: "0"
    volumes:
      - hf-cache:/root/.cache/huggingface
      - ../:/workspace:rw
    working_dir: /workspace
    networks:
      - gemma-reranker-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    oom_score_adj: 300
    command: ["python3", "/workspace/scripts/run_pipeline.py", "--path", "b", "--teacher-url", "http://gemma-reranker-teacher:8000/v1"]

networks:
  gemma-reranker-net:
    external: true

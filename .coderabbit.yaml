language: "en-US"
reviews:
  profile: "chill"
  request_changes_workflow: false
  auto_review:
    enabled: true
    ignore_title_keywords:
      - "chore"
      - "ci"
      - "deps"
      - "dependabot"
    drafts: false
  path_filters:
    - "!.github/workflows/**"
    - "!requirements*.txt"
    - "!*.lock"
    - "!pyproject.toml"
    - "!CHANGELOG.md"
chat:
  auto_reply: true

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title{font:700 30px Inter,Arial,sans-serif;fill:#f8fafc}
      .subtitle{font:500 15px Inter,Arial,sans-serif;fill:#67e8f9}
      .h{font:700 18px Inter,Arial,sans-serif;fill:#e2e8f0}
      .t{font:500 13px Inter,Arial,sans-serif;fill:#cbd5e1}
      .small{font:500 12px Inter,Arial,sans-serif;fill:#94a3b8}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1600" height="980" fill="#0b1220"/>
  <rect x="20" y="20" width="1560" height="90" rx="12" fill="#111827" stroke="#334155"/>
  <text x="40" y="62" class="title">Unified Canvas Automation Platform — Detailed Architecture</text>
  <text x="40" y="88" class="subtitle">CLI + Browser Extension share one domain core, integration layer, and quality gates</text>

  <rect x="30" y="140" width="300" height="260" rx="12" fill="#111827" stroke="#3b82f6"/>
  <text x="50" y="172" class="h">CLI Frontend</text>
  <text x="50" y="204" class="t">• Command router (cli.py)</text>
  <text x="50" y="226" class="t">• Textual TUI screens/widgets</text>
  <text x="50" y="248" class="t">• Notification adapter</text>
  <text x="50" y="280" class="small">Security: scoped commands, audit logs</text>

  <rect x="1270" y="140" width="300" height="260" rx="12" fill="#111827" stroke="#8b5cf6"/>
  <text x="1290" y="172" class="h">Browser Extension</text>
  <text x="1290" y="204" class="t">• Popup UI</text>
  <text x="1290" y="226" class="t">• Background service worker</text>
  <text x="1290" y="248" class="t">• Content script bridge</text>
  <text x="1290" y="280" class="small">Security: CSP + token isolation</text>

  <rect x="370" y="140" width="860" height="260" rx="12" fill="#111827" stroke="#22c55e"/>
  <text x="390" y="172" class="h">Shared Domain Core</text>
  <text x="390" y="204" class="t">• Use-case orchestrators</text>
  <text x="390" y="226" class="t">• Policy engine (scope/rate/role)</text>
  <text x="390" y="248" class="t">• Normalization + canonical mapping</text>
  <text x="390" y="270" class="t">• State + diff engine (delta detection)</text>
  <text x="390" y="302" class="small">Single contract for both surfaces = behavioral parity</text>

  <rect x="30" y="430" width="1540" height="250" rx="12" fill="#111827" stroke="#334155"/>
  <text x="50" y="462" class="h">Infrastructure + Integration Layer</text>

  <rect x="50" y="485" width="290" height="175" rx="10" fill="#1e293b"/>
  <text x="65" y="512" class="t">Canvas API Gateway</text>
  <text x="65" y="536" class="small">Retries, pagination, ETag</text>

  <rect x="360" y="485" width="290" height="175" rx="10" fill="#1e293b"/>
  <text x="375" y="512" class="t">Auth + Session Manager</text>
  <text x="375" y="536" class="small">OAuth refresh + scoped creds</text>

  <rect x="670" y="485" width="290" height="175" rx="10" fill="#1e293b"/>
  <text x="685" y="512" class="t">Persistence + Cache</text>
  <text x="685" y="536" class="small">SQLite / IndexedDB + TTL</text>

  <rect x="980" y="485" width="290" height="175" rx="10" fill="#1e293b"/>
  <text x="995" y="512" class="t">Queue + Scheduler</text>
  <text x="995" y="536" class="small">Debounced jobs + reminders</text>

  <rect x="1290" y="485" width="260" height="175" rx="10" fill="#1e293b"/>
  <text x="1305" y="512" class="t">Observability</text>
  <text x="1305" y="536" class="small">Logs, metrics, trace IDs</text>

  <rect x="30" y="710" width="510" height="240" rx="12" fill="#111827" stroke="#ef4444"/>
  <text x="50" y="742" class="h">External Systems</text>
  <text x="50" y="772" class="t">• Canvas LMS REST API</text>
  <text x="50" y="794" class="t">• Calendar (ICS/CalDAV)</text>
  <text x="50" y="816" class="t">• Desktop/mobile notifications</text>

  <rect x="560" y="710" width="500" height="240" rx="12" fill="#111827" stroke="#0ea5e9"/>
  <text x="580" y="742" class="h">Internal Data Stores</text>
  <text x="580" y="772" class="t">• assignment_cache</text>
  <text x="580" y="794" class="t">• grade_snapshots</text>
  <text x="580" y="816" class="t">• reminder_state + dedupe keys</text>

  <rect x="1080" y="710" width="490" height="240" rx="12" fill="#111827" stroke="#f59e0b"/>
  <text x="1100" y="742" class="h">Quality Gates</text>
  <text x="1100" y="772" class="t">• Schema + contract tests</text>
  <text x="1100" y="794" class="t">• Snapshot + lint/type checks</text>
  <text x="1100" y="816" class="t">• Canary + rollback strategy</text>

  <line x1="330" y1="250" x2="370" y2="250" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1270" y1="250" x2="1230" y2="250" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="400" x2="800" y2="430" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="680" x2="190" y2="710" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="810" y1="680" x2="810" y2="710" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1330" y1="680" x2="1330" y2="710" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
</svg>

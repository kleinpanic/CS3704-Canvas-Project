name: AI Fixup

on:
  workflow_run:
    workflow: CI
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-fixup:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]" --quiet

      - name: Get CI failure logs
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          # Try to get logs from the failed CI run; if unavailable (expired/permissions), skip gracefully
          gh run view $RUN_ID --log 2>/dev/null | tail -150 > ci-log.txt || echo "# Log unavailable" > ci-log.txt

      - name: Generate fix via Nemotron
        env:
          SPARK_HOST: ${{ vars.SPARK_HOST }}
          SPARK_PORT: ${{ vars.SPARK_PORT }}
          SPARK_API_KEY: ${{ secrets.SPARK_API_KEY }}
        run: |
          pip install requests --quiet 2>/dev/null
          python3 scripts/nemotron-fixup.py --log ci-log.txt --host "$SPARK_HOST" --port "$SPARK_PORT" --key "$SPARK_API_KEY" > fixup_response.txt || true

      - name: Create fixup branch
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          # Skip if Nemotron returned nothing or an error
          if [ ! -s fixup_response.txt ] || grep -q "^# NEMOTRON_ERROR" fixup_response.txt 2>/dev/null; then
            echo "fixup_pushed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          BRANCH="fixup/${RUN_ID}-attempt-1"
          git checkout -b "$BRANCH" || true
          cat fixup_response.txt | git apply --3way 2>/dev/null && APPLIED=true || APPLIED=false
          if [ "$APPLIED" = "true" ] && git diff --stat | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Auto-fixup: resolve test failures via Nemotron"
            git push -u origin "$BRANCH" --force
            echo "fixup_pushed=true" >> $GITHUB_OUTPUT
          else
            echo "fixup_pushed=false" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment
        if: always()
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          PR_NUM=$(gh pr list --head "$HEAD_BRANCH" --json number --jq \'.[0].number\')
          if [ -n "$PR_NUM" ]; then gh pr comment "$PR_NUM" --body "AI Fixup: review fixup branch and merge to resolve CI"; fi
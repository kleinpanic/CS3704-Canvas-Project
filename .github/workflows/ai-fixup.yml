name: AI Fixup

# Polls for failed CI runs instead of using workflow_run trigger.
# workflow_run is broken on this repo (GitHub "workflow file issue" validation error).

on:
  schedule:
    - cron: "*/5 * * * *"  # Every 5 minutes
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-fixup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check latest CI run
        id: check-ci
        run: |
          # Get the latest CI workflow run
          RUN=$(gh api repos/${{ github.repository }}/actions/workflows/ci.yml/runs \
            --jq '.workflow_runs[0] | {id, conclusion, status, head_branch, event, head_sha}')

          echo "Latest CI run:"
          echo "$RUN" | jq .

          CONCLUSION=$(echo "$RUN" | jq -r '.conclusion')
          BRANCH=$(echo "$RUN" | jq -r '.head_branch')
          EVENT=$(echo "$RUN" | jq -r '.event')
          SHA=$(echo "$RUN" | jq -r '.head_sha')
          RUN_ID=$(echo "$RUN" | jq -r '.id')

          echo "conclusion=$CONCLUSION" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "event=$EVENT" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

          # Determine if we should run fixup
          if [ "$CONCLUSION" != "failure" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "REASON=C I did not fail"
          elif [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "REASON=main branch — no PR"
          elif [ "$EVENT" != "pull_request" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "REASON=Not a PR — $EVENT"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "REASON=CI failed on PR branch $BRANCH"
          fi

      - name: Run AI fixup
        if: steps.check-ci.outputs.skip == 'false'
        run: |
          echo "Running AI fixup on PR branch: ${{ steps.check-ci.outputs.branch }}"
          echo "SHA: ${{ steps.check-ci.outputs.sha }}"
          echo "Conclusion was: ${{ steps.check-ci.outputs.conclusion }}"

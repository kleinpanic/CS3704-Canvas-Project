name: AI Fixup

on:
  workflow_run:
    workflow: CI
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-fixup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check if should run
        id: gate
        run: |
          conclusion="${{ github.event.workflow_run.conclusion }}"
          branch="${{ github.event.workflow_run.head_branch }}"
          echo "CI conclusion: $conclusion"
          echo "PR branch: $branch"
          if [ "$conclusion" != "failure" ]; then
            echo "SKIP: CI did not fail"
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [ "$branch" = "main" ] || [ "$branch" = "master" ]; then
            echo "SKIP: main branch — no PR"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run AI fixup
        if: steps.gate.outputs.skip == 'false'
        run: |
          echo "Running AI fixup on PR branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Conclusion was: ${{ github.event.workflow_run.conclusion }}"

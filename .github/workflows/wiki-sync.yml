# PREREQUISITE: The GitHub Wiki must be initialized before this workflow runs.
# Go to https://github.com/kleinpanic/CS3704-Canvas-Project/wiki and create
# the first page manually — GitHub only provisions the wiki.git repo on first use.

name: Sync docs to Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/docs/**'
      - 'docs-site/mkdocs.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/kleinpanic/CS3704-Canvas-Project.wiki.git" wiki-out

      - name: Copy docs
        run: |
          # Copy top-level .md files; rename index.md → Home.md (wiki landing page convention)
          cp docs-site/docs/*.md wiki-out/ 2>/dev/null || true
          if [ -f wiki-out/index.md ]; then
            mv wiki-out/index.md wiki-out/Home.md
          fi
          # Copy .md files from subdirectories (skip index.md — already handled above)
          find docs-site/docs -mindepth 2 -name "*.md" -not -name "index.md" | while read f; do
            cp "$f" wiki-out/
          done

      - name: Commit and push
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cd wiki-out
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes."
          else
            git commit -m "sync: mirror docs from main @ ${COMMIT_SHA}"
            git push
          fi

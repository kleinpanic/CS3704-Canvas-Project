name: PR Quality
on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]
    branches: [main]
permissions:
  pull-requests: read
  contents: read
jobs:
  conventional-title:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50  # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            perf
            style
            ci
            build
            revert

  changelog-required:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - uses: dangoslen/changelog-enforcer@8b5e9dc3121363bb7c0115f8533404d92af382de  # v3.7.0
        with:
          changeLogPath: CHANGELOG.md
          skipLabels: 'skip-changelog,dependencies'

  size-check:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Check PR size
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          additions=$(gh pr view "$PR_NUMBER" --json additions -q '.additions')
          deletions=$(gh pr view "$PR_NUMBER" --json deletions -q '.deletions')
          total=$((additions + deletions))
          echo "PR diff size: $total lines ($additions added, $deletions deleted)"
          labels=$(gh pr view "$PR_NUMBER" --json labels -q '[.labels[].name] | join(",")')
          if [ "$total" -gt 1000 ] && [[ "$labels" != *"large-pr"* ]]; then
            echo "::error::PR is $total lines (limit: 1000). Add 'large-pr' label to override."
            exit 1
          fi

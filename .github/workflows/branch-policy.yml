name: Branch Policy

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  branch-name:
    name: Branch Name Policy
    runs-on: ubuntu-latest
    steps:
      - name: Enforce feature branch naming
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          echo "Checking branch: $BRANCH_NAME"
          # Allow dependabot branches or any lowercase prefix/description branch
          if [[ "$BRANCH_NAME" =~ ^[a-z]+/[a-z0-9._-]+$ ]] || [[ "$BRANCH_NAME" =~ ^dependabot/ ]]; then
            echo "Branch name is valid"
          else
            echo "Invalid branch name: $BRANCH_NAME"
            echo "Expected: <prefix>/<description> where prefix is lowercase letters (e.g. feat/my-feature, fix/bug-name)"
            echo "See CONTRIBUTING.md for branch naming conventions."
            exit 1
          fi

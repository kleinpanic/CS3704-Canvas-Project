name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions: read-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  require-ci:
    runs-on: ubuntu-latest
    outputs:
      ci_passed: ${{ steps.ci.result }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - name: Check CI status
        id: ci
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            const run = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: 'main',
              status: 'success',
              head_sha: context.sha,
              per_page: 1
            });
            if (run.data.workflow_runs.length > 0) {
              console.log(`CI passed for ${context.sha}`);
              return true;
            }
            const maxAttempts = 15;
            const baseDelayMs = 10_000;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const r = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yml',
                branch: 'main',
                status: 'success',
                head_sha: context.sha,
                per_page: 1
              });
              if (r.data.workflow_runs.length > 0) {
                console.log(`CI passed after ${attempt} attempt(s)`);
                return true;
              }
              if (attempt < maxAttempts) {
                const delay = baseDelayMs * Math.pow(1.5, attempt - 1);
                console.log(`Waiting ${delay}ms...`);
                await new Promise(resolve => setTimeout(resolve, delay));
              }
            }
            throw new Error(`No successful CI for ${context.sha} after ${maxAttempts} attempts`);
          result-encoding: 'string'

      - name: Report CI failure
        if: failure()
        run: |
          echo "CI check failed — release will not proceed."
          echo "Check CI at: https://github.com/${{ github.repository }}/actions/workflows/ci.yml"

  # ──────────────────────────────────────────────────────────────────────────
  # 1. Source archives
  # ──────────────────────────────────────────────────────────────────────────
  build-source:
    needs: require-ci
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build source archives
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git archive --format=tar.gz \
            --prefix="canvas-tracker-${VERSION}/" \
            HEAD \
            -o "canvas-tracker-${VERSION}-source.tar.gz"
          git archive --format=zip \
            --prefix="canvas-tracker-${VERSION}/" \
            HEAD \
            -o "canvas-tracker-${VERSION}-source.zip"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: source-archives
          path: |
            canvas-tracker-*-source.tar.gz
            canvas-tracker-*-source.zip
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # 2a. canvas-sdk — Linux (sdist + pure-Python wheel)
  # ──────────────────────────────────────────────────────────────────────────
  build-sdk-linux:
    needs: require-ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install build deps
        run: python -m pip install --upgrade --no-cache-dir pip build "setuptools>=70" wheel

      - name: Build sdk sdist and wheel
        run: python -m build src/sdk/ --outdir sdk-dist/

      - name: Rename artifacts to canonical names
        # python -m build produces canvas_sdk-{ver}.tar.gz / canvas_sdk-{ver}-py3-none-any.whl
        # (PEP 625 underscore normalization). Rename to hyphenated form for release.
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          find sdk-dist/ -name "canvas_sdk-*.tar.gz" \
            -exec mv {} "sdk-dist/canvas-sdk-${VERSION}.tar.gz" \;
          # Wheel intentionally NOT renamed — PEP 427 requires underscored package name in wheel filename. PyPI rejects hyphen-named wheels with metadata errors.

      - name: Compute artifact hashes
        id: hash
        run: |
          echo "hashes=$(sha256sum sdk-dist/*.whl sdk-dist/*.tar.gz | base64 -w0)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sdk-linux
          path: sdk-dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # 2b. canvas-sdk — macOS wheel (wrapped as .tar.gz per release spec)
  # Note: canvas-sdk is pure Python so the wheel is platform-independent;
  # the macOS build is provided as a distinct tagged asset per spec.
  # The wheel is wrapped in a .tar.gz — not renamed directly — to avoid
  # corrupting the zip format of the .whl container.
  # ──────────────────────────────────────────────────────────────────────────
  build-sdk-macos:
    needs: require-ci
    runs-on: macos-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install build deps
        run: python -m pip install --upgrade --no-cache-dir pip build "setuptools>=70" wheel

      - name: Build sdk wheel on macOS
        run: python -m build --wheel src/sdk/ --outdir sdk-macos-dist/

      - name: Package macOS wheel as tar.gz
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          WHL=$(find sdk-macos-dist/ -name "*.whl" | head -1)
          tar -czf "canvas-sdk-${VERSION}-macos.tar.gz" \
            -C sdk-macos-dist/ "$(basename "$WHL")"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sdk-macos
          path: canvas-sdk-*-macos.tar.gz
          retention-days: 7

  # canvas-tui packaging not yet available — tracked in issue #177

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Extension assets (.zip always; .crx only when EXTENSION_PEM secret set)
  # ──────────────────────────────────────────────────────────────────────────
  build-extension:
    needs: require-ci
    runs-on: ubuntu-latest
    env:
      HAS_PEM: ${{ secrets.EXTENSION_PEM != '' }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build extension zip
        # Excludes dev-only files (node_modules, tests, build config, package manifests)
        # that should not ship in the extension archive.
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          cd extension
          zip -r "../canvas-tracker-extension-${VERSION}.zip" . \
            -x "node_modules/*" \
            -x "tests/*" \
            -x "*.config.cjs" \
            -x "package.json" \
            -x "package-lock.json"

      - name: Build extension CRX
        # CRX signing requires a .pem private key. This step is skipped when
        # the EXTENSION_PEM repository secret is not configured.
        # To enable: add a repository secret named EXTENSION_PEM whose value is
        # the base64-encoded PEM private key used to sign the extension.
        if: ${{ env.HAS_PEM == 'true' }}
        env:
          EXTENSION_PEM_B64: ${{ secrets.EXTENSION_PEM }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          echo "$EXTENSION_PEM_B64" | base64 -d > extension.pem
          npm install -g crx3
          npx crx3 -p extension.pem extension/ -o "canvas-tracker-extension-${VERSION}.crx"
          rm -f extension.pem

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: extension-assets
          path: |
            canvas-tracker-extension-*.zip
            canvas-tracker-extension-*.crx
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Final: collect all artifacts and publish a single GitHub Release
  # ──────────────────────────────────────────────────────────────────────────
  release:
    needs:
      - build-source
      - build-sdk-linux
      - build-sdk-macos
      - build-extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - name: Extract version and pre-release flag
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: release-assets/
          merge-multiple: true

      - name: List release assets
        run: find release-assets/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          name: Release ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: release-assets/**

      - name: Notify on failure
        if: failure()
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          echo "::error::Release ${{ needs.build-sdk-linux.outputs.version }} failed. Check logs: https://github.com/${{ github.repository }}/actions/workflows/release.yml"

  # Publishes stable releases (no pre-release suffixes) to PyPI via API token.
  publish-pypi:
    needs: [release, build-sdk-linux]
    if: ${{ !contains(needs.build-sdk-linux.outputs.version, '-') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/canvas-sdk/${{ needs.build-sdk-linux.outputs.version }}/
    permissions:
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Build PEP 625-compliant sdist + wheel from source
        # build-sdk-linux renames canvas_sdk-*.tar.gz to canvas-sdk-* for the GH release.
        # PyPI requires PEP 625 underscore names, so we rebuild fresh here.
        run: |
          python -m pip install --upgrade --no-cache-dir pip build "setuptools>=70" wheel
          python -m build src/sdk/ --outdir dist/
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          skip-existing: true
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}


  generate-sbom:
    name: Generate SBOM
    needs: [release, build-sdk-linux]
    if: ${{ !contains(needs.build-sdk-linux.outputs.version, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - name: Download SDK artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: sdk-linux
          path: dist/

      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532  # v0.20.0
        with:
          artifact-name: sbom.cyclonedx.json
          format: cyclonedx-json
          path: dist/

      - name: Attach SBOM to GH Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.ref_name }}
          files: sbom.cyclonedx.json

  sigstore-sign:
    name: Sign wheel + sdist with Sigstore
    needs: [release, build-sdk-linux]
    if: ${{ !contains(needs.build-sdk-linux.outputs.version, '-') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - name: Download SDK artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: sdk-linux
          path: dist/

      - name: Sign with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc  # v3.3.0
        with:
          inputs: dist/*.whl dist/*.tar.gz

      - name: Attach signatures to GH Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.sigstore.json

  slsa-provenance:
    name: SLSA Provenance
    needs: [release, build-sdk-linux]
    if: ${{ !contains(needs.build-sdk-linux.outputs.version, '-') }}
    permissions:
      id-token: write
      contents: write
      actions: read
    # SLSA generator reusable workflow: pinned to semver per SLSA spec (SHA not valid here)
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build-sdk-linux.outputs.hashes }}"
      upload-assets: true

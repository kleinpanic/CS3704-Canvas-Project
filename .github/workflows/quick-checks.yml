name: Quick Checks

# Fast lint + typecheck that runs before the full test suite.
# Provides rapid feedback on every push/PR without the overhead of pytest.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-paths: |
            pyproject.toml
            src/sdk/pyproject.toml

      - name: Install ruff
        run: pip install ruff --quiet

      - name: Run ruff check
        run: ruff check src/

  format-check:
    name: Ruff Format
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff --quiet

      - name: Check formatting
        run: ruff format src/ --check --diff

  typecheck:
    name: Mypy Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-paths: pyproject.toml

      - name: Install type deps
        run: pip install mypy types-requests --quiet

      - name: Run mypy
        run: mypy src/canvas_tui --ignore-missing-imports --pretty

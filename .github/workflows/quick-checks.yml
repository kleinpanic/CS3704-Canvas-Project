name: Quick Checks

# Fast lint + typecheck that runs before the full test suite.
# Provides rapid feedback on every push/PR without the overhead of pytest.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-paths: |
            pyproject.toml
            sdk/pyproject.toml

      - name: Install ruff
        run: pip install ruff --quiet

      - name: Run ruff check
        run: ruff check src/ sdk/ --output-format=text

  format-check:
    name: Ruff Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff --quiet

      - name: Check formatting
        run: ruff format src/ sdk/ --check --diff

  typecheck:
    name: Mypy Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-paths: pyproject.toml

      - name: Install type deps
        run: pip install mypy types-requests --quiet

      - name: Run mypy
        run: mypy src/canvas_tui --ignore-missing-imports --pretty
        continue-on-error: true

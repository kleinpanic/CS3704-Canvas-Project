name: Version Check
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Verify versions match
        run: |
          ROOT=$(grep -m1 '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SDK=$(grep -m1 '^version' src/sdk/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Root canvas-tui: $ROOT"
          echo "SDK canvas-sdk:  $SDK"
          if [ "$ROOT" != "$SDK" ]; then
            echo "::error::Version drift: pyproject.toml=$ROOT but src/sdk/pyproject.toml=$SDK"
            exit 1
          fi
      - name: Verify CHANGELOG entry exists
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing entry for $VERSION"
            exit 1
          fi

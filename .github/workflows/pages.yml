name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_CANVAS_TOKEN: ${{ secrets.CANVAS_API_TOKEN != '' }}
      HAS_CANVAS_BASE_URL: ${{ secrets.CANVAS_BASE_URL != '' }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs
        run: pip install mkdocs-material --quiet

      - name: Build MkDocs docs
        run: |
          cd docs-site
          mkdocs build

      # Copy real extension source so the live demo runs the actual code
      - name: Copy extension source for live demo
        run: |
          mkdir -p site/extension/src
          cp -r extension/src/popup site/extension/src/popup
          cp -r extension/src/lib   site/extension/src/lib

      # Swap in the production shim (calls static JSON, no CORS needed)
      - name: Install production chrome shim
        run: |
          cp docs-site/chrome_shim_prod.js site/extension/src/popup/chrome_shim_prod.js
          # Replace the dev shim reference in popup HTML with the prod shim
          sed -i 's|<script src="chrome_shim.js"></script>|<script src="chrome_shim_prod.js"></script>|g' \
            site/extension/src/popup/index.html

      # PII scrub regex sanity check — self-test does no live HTTP.
      - name: PII scrub self-test
        run: |
          python3 docs-site/fetch_canvas_data.py --self-test

      # Populate site/data/ with Canvas data (live or mock).
      # Live mode: requires CANVAS_API_TOKEN + CANVAS_BASE_URL secrets.
      # Mock mode: generates realistic fake data for the demo — no token needed.
      - name: Fetch Canvas data (live or mock)
        env:
          CANVAS_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
          CANVAS_BASE_URL: ${{ secrets.CANVAS_BASE_URL }}
        run: |
          if [ -n "$CANVAS_TOKEN" ] && [ -n "$CANVAS_BASE_URL" ]; then
            echo "Live mode: fetching real Canvas data"
            python3 docs-site/fetch_canvas_data.py --out site/data
          else
            echo "Mock mode: CANVAS_API_TOKEN or CANVAS_BASE_URL not configured — using demo data"
            python3 docs-site/fetch_canvas_data.py --mock --out site/data
          fi

      # Place the Tailwind homepage at site root
      - name: Install homepage
        run: cp docs-site/index.html site/index.html

      # Copy the agent demo page, method explainer, and favicon
      - name: Install agent demo
        run: |
          mkdir -p site/agent-demo
          cp docs-site/agent-demo/index.html site/agent-demo/index.html
          cp docs-site/agent-demo/method.html site/agent-demo/method.html
          cp docs-site/favicon.svg site/favicon.svg
          cp docs-site/favicon.svg site/docs/favicon.svg
          cp docs-site/roadmap.html site/roadmap.html

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4

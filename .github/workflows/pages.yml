name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs
        run: pip install mkdocs-material --quiet

      - name: Build MkDocs docs
        run: |
          cd docs-site
          mkdocs build

      # Copy real extension source so the live demo runs the actual code
      - name: Copy extension source for live demo
        run: |
          mkdir -p site/extension/src
          cp -r extension/src/popup site/extension/src/popup
          cp -r extension/src/lib   site/extension/src/lib

      # Swap in the production shim (calls static JSON, no CORS needed)
      - name: Install production chrome shim
        run: |
          cp docs-site/chrome_shim_prod.js site/extension/src/popup/chrome_shim_prod.js
          # Replace the dev shim reference in popup HTML with the prod shim
          sed -i 's|<script src="chrome_shim.js"></script>|<script src="chrome_shim_prod.js"></script>|g' \
            site/extension/src/popup/index.html

      # Inject Canvas token and HF token into prod shim at build time (never in source)
      - name: Inject Canvas token and HF token
        env:
          CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          sed -i "s|__CANVAS_TOKEN__|${CANVAS_API_TOKEN}|g" \
            site/extension/src/popup/chrome_shim_prod.js
          sed -i "s|__HF_TOKEN__|${HF_TOKEN}|g" \
            site/extension/src/popup/chrome_shim_prod.js

      # Pre-fetch live Canvas data and bake as static JSON
      - name: Fetch Canvas data snapshot
        env:
          CANVAS_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
        run: |
          python3 docs-site/fetch_canvas_data.py --out site/data

      # Inject Canvas token into homepage shim at build time (never in source)
      - name: Inject token into homepage
        env:
          CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
        run: |
          sed -i "s|__CANVAS_TOKEN__|${CANVAS_API_TOKEN}|g" \
            docs-site/index.html

      # Place the Tailwind homepage at site root
      - name: Install homepage
        run: cp docs-site/index.html site/index.html

      # Copy the standalone Gemini-backed agent demo (no untrusted input)
      - name: Install agent demo
        run: |
          mkdir -p site/agent-demo
          cp docs-site/agent-demo/index.html site/agent-demo/index.html

      # Inject HF token into agent demo so authenticated requests bypass
      # the small ZeroGPU anonymous quota. Token is read-only / inference-scoped.
      - name: Inject HF token into agent demo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          sed -i "s|__HF_TOKEN__|${HF_TOKEN}|g" site/agent-demo/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

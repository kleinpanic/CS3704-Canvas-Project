name: Stale

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f  # v10
        with:
          stale-issue-message: "This issue has gone stale due to inactivity. Update it if it is still active."
          stale-pr-message: "This PR has gone stale due to inactivity. Update it if it is still active."
          close-issue-message: "Closing stale issue after extended inactivity."
          close-pr-message: "Closing stale PR after extended inactivity."
          days-before-stale: 14
          days-before-close: 7
          exempt-issue-labels: "security,pinned"
          exempt-pr-labels: "security,pinned"
          start-date: "2026-01-01"

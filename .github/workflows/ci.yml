name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-paths: |
            pyproject.toml
            src/sdk/pyproject.toml

      - name: Install package
        run: pip install -e ".[dev]" --quiet

      - name: Run tests
        run: pytest tests/ -q -p no:cacheprovider --tb=short 2>&1 | tail -20

  coverage-check:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-paths: |
            pyproject.toml
            src/sdk/pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" --quiet

      - name: Run with coverage
        run: pytest tests/ -q --cov=canvas_tui --cov-report=term-missing

      - name: Coverage threshold
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Push to main — coverage threshold check skipped (see coverage.yml)"
            exit 0
          fi
          coverage report --fail-under=80
          echo "Coverage check passed"

  python-compat:
    name: Python Compat
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-paths: |
            pyproject.toml
            src/sdk/pyproject.toml

      - name: Syntax smoke test
        run: python -c "import canvas_tui; print('OK')"
        continue-on-error: true

  dead-code:
    name: Dead Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vulture
        run: pip install vulture --quiet

      - name: Run vulture
        run: |
          # Ignore names used via reflection, dynamic getattr, etc.
          # Exclude test files (they import everything, lots of false positives)
          vulture src/canvas_tui --ignore-names "_,M,n,q,w,_,_,_,__" --min-confidence 80 2>&1 | tee vulture_report.txt
          if [ -s vulture_report.txt ]; then
            echo "Dead code detected (see report below) — non-blocking warning:"
            cat vulture_report.txt
            exit 0  # non-blocking: vulture warnings do not fail the job
          fi
          echo "No dead code found — all clear"
        continue-on-error: true

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" --quiet

      - name: Run tests
        run: pytest tests/ -q

  coverage-check:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" --quiet

      - name: Run with coverage
        run: pytest tests/ -q --cov=canvas_tui --cov-report=term-missing

      - name: Coverage threshold
        run: |
          # On direct push to main, skip threshold (coverage.yml handles it)
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Push to main — coverage threshold check skipped (see coverage.yml)"
            exit 0
          fi
          # Bypass: any PR with "#no-coverage-check" in description skips threshold
          PR_BODY="${{ github.event.pull_request.body }}"
          if echo "$PR_BODY" | grep -qi "no-coverage-check"; then
            echo "Coverage check bypassed by PR author"
            exit 0
          fi
          coverage report --fail-under=80
          echo "Coverage check passed"

  python-compat:
    name: Python Compat
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax smoke test
        run: python -c "import canvas_tui; print('OK')"
        continue-on-error: true
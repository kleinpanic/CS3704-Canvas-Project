name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint deps
        run: pip install ruff
      - name: Ruff check
        run: ruff check src tests

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project + test deps
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest tests/ -q --maxfail=1 --disable-warnings --cov=canvas_tui --cov-report=term-missing

  typecheck-advisory:
    name: Type Check (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mypy deps
        run: pip install mypy types-requests textual requests
      - name: Run mypy (non-blocking)
        run: mypy src/canvas_tui/ --ignore-missing-imports

name: Auto Docs

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.py'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]" --quiet

      - name: Scan for undocumented modules
        id: scan
        run: python3 scripts/nemotron-docs.py --scan-only > scan-results.txt && cat scan-results.txt >> $GITHUB_OUTPUT

      - name: Generate docstrings
        if: steps.scan.outputs.MISSING_MODULES != ''
        env:
          SPARK_HOST: ${{ vars.SPARK_HOST }}
          SPARK_PORT: ${{ vars.SPARK_PORT }}
          SPARK_API_KEY: ${{ secrets.SPARK_API_KEY }}
        run: |
          pip install requests --quiet 2>/dev/null
          python3 scripts/nemotron-docs.py \
            --modules "${{ steps.scan.outputs.MISSING_MODULES }}" \
            --host "$SPARK_HOST" --port "$SPARK_PORT" --key "$SPARK_API_KEY" \
            > docs-output.txt || true
          wc -l docs-output.txt >> $GITHUB_OUTPUT

      - name: Create auto-docs PR
        if: steps.scan.outputs.MISSING_MODULES != ''
        run: |
          if [ ! -s docs-output.txt ]; then exit 0; fi
          BRANCH="auto-docs/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          cat docs-output.txt
          git add -A && git commit -m "Auto-generated documentation stubs" || exit 0
          git push -u origin "$BRANCH"
          gh pr create --title "Auto-generated Documentation" \
            --body "## Documentation Update\n\nAI-generated docstring stubs — review carefully before merging.\n\nNon-blocking: does not affect CI status." \
            --base main
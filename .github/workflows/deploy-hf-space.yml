# Requires HF_TOKEN secret set in repo Settings → Secrets → Actions.
# Token needs write access to the Space.
name: Deploy HF Space

on:
  push:
    branches: [main]
    paths:
      - "hf-space/**"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Push hf-space/ to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_SHA_SHORT: ${{ github.sha }}
        run: |
          cd hf-space
          git init
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -m "deploy: $GITHUB_SHA_SHORT" || echo "Nothing to commit"
          git push https://kleinpanic93:$HF_TOKEN@huggingface.co/spaces/kleinpanic93/canvas-calendar-agent-demo main --force

      - name: Print logs URL on failure
        if: failure()
        run: |
          echo "Deployment failed. View logs at:"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

# Requires HF_TOKEN secret set in repo Settings → Secrets → Actions.
# Token needs write access to the Space.
name: Deploy HF Space

on:
  push:
    branches: [main]
    paths:
      - "hf-space/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_HF_TOKEN: ${{ secrets.HF_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install huggingface_hub
        run: pip install "huggingface_hub[cli]>=0.23"

      - name: Upload hf-space/ to HuggingFace Space
        if: ${{ env.HAS_HF_TOKEN == 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload kleinpanic93/canvas-calendar-agent-demo \
            hf-space/ . \
            --repo-type space \
            --commit-message "deploy: ${{ github.sha }}"

      - name: Skip notice (fork — no HF_TOKEN)
        if: ${{ env.HAS_HF_TOKEN != 'true' }}
        run: echo "fork: skipping HF Space deploy (HF_TOKEN not configured); see CONTRIBUTING.md"

      - name: Print logs URL on failure
        if: failure()
        run: |
          echo "Deployment failed. View logs at:"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

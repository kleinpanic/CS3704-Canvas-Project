# Requires HF_TOKEN secret set in repo Settings → Secrets → Actions.
# Token needs write access to the Space.
name: Deploy HF Space

on:
  push:
    branches: [main]
    paths:
      - "hf-space/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_HF_TOKEN: ${{ secrets.HF_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install huggingface_hub
        run: pip install "huggingface_hub[cli]>=0.23"

      - name: Upload hf-space/ to HuggingFace Space
        if: ${{ env.HAS_HF_TOKEN == 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload kleinpanic93/canvas-calendar-agent-demo \
            hf-space/ . \
            --repo-type space \
            --commit-message "deploy: ${{ github.sha }}"

      - name: Skip notice (fork — no HF_TOKEN)
        if: ${{ env.HAS_HF_TOKEN != 'true' }}
        run: |
          echo "fork: skipping HF Space deploy (HF_TOKEN not configured); see CONTRIBUTING.md"

      - name: Print logs URL on failure
        if: failure()
        run: |
          echo "Deployment failed. View logs at:"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  smoke-test:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ secrets.HF_TOKEN != '' }}
    steps:
      - name: Poll Space until healthy (max 90s for ZeroGPU cold-start)
        run: |
          SPACE_URL="https://kleinpanic93-canvas-calendar-agent-demo.hf.space"
          deadline=$((SECONDS + 90))
          status=0
          while [ $SECONDS -lt $deadline ]; do
            http_code=$(curl -s -o /dev/null -w "%{http_code}" "$SPACE_URL")
            if [ "$http_code" = "200" ]; then
              status=200
              break
            fi
            echo "Space returned $http_code — waiting..."
            sleep 10
          done
          if [ "$status" != "200" ]; then
            echo "ERROR: Space did not return 200 within 90s (last code: $http_code)"
            exit 1
          fi
          echo "Space is up (200 OK)"

      - name: Assert expected content in HTML
        run: |
          SPACE_URL="https://kleinpanic93-canvas-calendar-agent-demo.hf.space"
          body=$(curl -sf "$SPACE_URL")
          if ! echo "$body" | grep -q "Canvas"; then
            echo "ERROR: 'Canvas' not found in Space HTML"
            exit 1
          fi
          if ! echo "$body" | grep -q "v7-DPO"; then
            echo "ERROR: 'v7-DPO' not found in Space HTML"
            exit 1
          fi
          echo "Smoke test passed: Canvas + v7-DPO found in Space HTML"

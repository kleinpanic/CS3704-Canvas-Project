name: Cleanup Artifacts

# Runs weekly to clean up old workflow artifacts.
# GitHub caps at 10 GB; proactive cleanup keeps costs low and UI clean.
on:
  schedule:
    - cron: "0 6 * * 0"  # every Sunday at 06:00 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - name: Clean old artifacts
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            const { repo } = context;
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: repo.owner,
              repo: repo.repo,
              per_page: 100
            });

            const sevenDaysAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
            let deleted = 0;

            for (const artifact of artifacts.data.artifacts) {
              if (artifact.created_at && new Date(artifact.created_at).getTime() < sevenDaysAgo) {
                console.log(`Deleting artifact: ${artifact.name} (${artifact.id}) created ${artifact.created_at}`);
                await github.rest.actions.deleteArtifact({
                  owner: repo.owner,
                  repo: repo.repo,
                  artifact_id: artifact.id
                });
                deleted++;
              }
            }

            console.log(`Cleaned up ${deleted} artifact(s)`);

      - name: Clean old workflow runs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            // Dynamically list all workflows in the repo
            const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const KEEP_LAST = 20;
            // To protect a run: use the GitHub API to add 'protect-run' label when API supports it

            for (const wf of workflows) {
              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: wf.id,
                per_page: 100
              });

              if (runs.length <= KEEP_LAST) {
                console.log(`${wf.name}: ${runs.length} runs - under limit, skipping`);
                continue;
              }

              const toDelete = runs.slice(KEEP_LAST);

              for (const run of toDelete) {
                console.log(`Deleting run: ${wf.name} #${run.run_number} (${run.id})`);
                await github.rest.actions.deleteWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id
                });
              }
            }

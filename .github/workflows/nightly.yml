name: Nightly Release
on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: nightly
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'
      - name: Build SDK wheel
        run: |
          cd src/sdk
          pip install build
          python -m build --wheel --sdist
      - name: Build extension archive
        run: |
          tar -czf canvas-extension-nightly.tar.gz -C extension src manifest.json
      - name: Compute tag
        id: tag
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d)
          TAG="nightly-${DATE}-${SHA}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Create tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
      - name: Publish pre-release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 'Nightly ${{ steps.tag.outputs.tag }}'
          prerelease: true
          body: |
            Automated nightly snapshot of `main`.

            This is a pre-release build for testing. NOT published to PyPI. Use stable `v*` releases for production.

            Commit: ${{ github.sha }}
          files: |
            src/sdk/dist/*
            canvas-extension-nightly.tar.gz

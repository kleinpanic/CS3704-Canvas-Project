name: Docker

on:
  push:
    branches: [main]
    paths:
      - 'src/canvas_tui/**'
      - 'pyproject.toml'
      - 'docker/canvas-tui/**'
    tags: ['v*.*.*']

permissions: read-all

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2
        with:
          egress-policy: audit
          # allow-list: ghcr.io, registry-1.docker.io, github.com, pypi.org

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/canvas-tui
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: docker/canvas-tui/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          cosign-release: 'v2.4.0'

      - name: Sign image with cosign
        run: |
          IMAGE_DIGEST="${{ steps.build.outputs.digest }}"
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/canvas-tui"
          cosign sign --yes "${IMAGE_NAME}@${IMAGE_DIGEST}"
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Generate Docker SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532  # v0.20.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/canvas-tui@${{ steps.build.outputs.digest }}
          artifact-name: sbom-docker.cyclonedx.json
          format: cyclonedx-json
